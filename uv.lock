[[package]]
name = "xls-synth"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "fastapi" },
    { name = "midigen-lib" },
    { name = "mido" },
    { name = "numpy", version = "2.2.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "numpy", version = "2.4.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.11'" },
    { name = "pillow" },
    { name = "sounddevice" },
    { name = "soundfile" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
docs = [
    { name = "schemdraw" },
]
localmidi = [
    { name = "python-rtmidi" },
]
presetgen = [
    { name = "cma" },
    { name = "dawdreamer" },
    { name = "numba" },
    { name = "pedalboard" },
    { name = "pyfluidsynth" },
    { name = "scipy", version = "1.15.3", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "scipy", version = "1.17.1", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version == '3.11.*'" },
    { name = "scipy", version = "1.18.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.12'" },
]

[package.metadata]
requires-dist = [
    { name = "cma", marker = "extra == 'presetgen'", specifier = ">=4.4.4" },
    { name = "dawdreamer", marker = "extra == 'presetgen'", specifier = ">=0.8.3" },
    { name = "fastapi", specifier = ">=0.110" },
    { name = "midigen-lib", specifier = ">=1.1.0" },
    { name = "mido", specifier = ">=1.3.3" },
    { name = "numba", marker = "extra == 'presetgen'", specifier = ">=0.60.0" },
    { name = "numpy", specifier = ">=2.0.2" },
    { name = "pedalboard", marker = "extra == 'presetgen'", specifier = ">=0.9.19" },
    { name = "pillow", specifier = ">=11.3.0" },
    { name = "pyfluidsynth", marker = "extra == 'presetgen'", specifier = ">=1.3.6" },
    { name = "python-rtmidi", marker = "extra == 'localmidi'", specifier = ">=1.5.8" },
    { name = "schemdraw", marker = "extra == 'docs'", specifier = ">=0.19" },
    { name = "scipy", marker = "extra == 'presetgen'", specifier = ">=1.13.1" },
    { name = "sounddevice", specifier = ">=0.5.5" },
    { name = "soundfile", specifier = ">=0.13.1" },
    { name = "uvicorn", extras = ["standard"], specifier = ">=0.29" },
]
